    <g id="confetti-2"><rect width="8" height="20" fill="#06D6A0" transform="rotate(-45)"/></g>
    <g id="confetti-3"><circle cx="0" cy="0" r="7" fill="#118AB2"/></g>
    <g id="confetti-4"><polygon points="0,-10 10,10 -10,10" fill="#F72585" transform="rotate(15)"/></g>
