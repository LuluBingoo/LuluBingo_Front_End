<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#E63946" />
      <stop offset="60%" stop-color="#B21F2D" />
      <stop offset="100%" stop-color="#660708" />
    </radialGradient>
    
    <radialGradient id="ball-grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="80%" stop-color="#E0E0E0" />
      <stop offset="100%" stop-color="#BDBDBD" />
    </radialGradient>

    <radialGradient id="gold-ball-grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFF3B0" />
      <stop offset="70%" stop-color="#FFD166" />
      <stop offset="100%" stop-color="#E0A96D" />
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="8" stdDeviation="5" flood-color="#3A0CA3" flood-opacity="0.4"/>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g id="bingo-grid">
      <line x1="10" y1="46" x2="150" y2="46" stroke="#E63946" stroke-width="2"/>
      <line x1="10" y1="74" x2="150" y2="74" stroke="#E63946" stroke-width="2"/>
      <line x1="10" y1="102" x2="150" y2="102" stroke="#E63946" stroke-width="2"/>
      <line x1="10" y1="130" x2="150" y2="130" stroke="#E63946" stroke-width="2"/>
      <line x1="38" y1="18" x2="38" y2="158" stroke="#E63946" stroke-width="2"/>
      <line x1="66" y1="18" x2="66" y2="158" stroke="#E63946" stroke-width="2"/>
      <line x1="94" y1="18" x2="94" y2="158" stroke="#E63946" stroke-width="2"/>
      <line x1="122" y1="18" x2="122" y2="158" stroke="#E63946" stroke-width="2"/>
      <polygon points="80,78 84,86 92,87 86,93 88,101 80,97 72,101 74,93 68,87 76,86" fill="#FFD166"/>
