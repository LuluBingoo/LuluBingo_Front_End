      <circle cx="52" cy="30" r="8" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="80" cy="30" r="8" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="108" cy="30" r="8" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="136" cy="30" r="8" fill="#FFFFFF" opacity="0.9"/>
      <rect x="10" y="58" width="140" height="140" fill="none" stroke="#E63946" stroke-width="4" rx="4"/>
      <use href="#bingo-grid" x="0" y="40"/>
    </g>

    <g id="bingo-ball">
      <circle cx="0" cy="0" r="45" fill="url(#ball-grad)" filter="url(#shadow)"/>
