<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <pattern id="grid-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B21F2D" stroke-width="1" opacity="0.3"/>
    </pattern>
    <linearGradient id="red-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D90429" />
      <stop offset="50%" stop-color="#EF233C" />
      <stop offset="100%" stop-color="#8D0801" />
    </linearGradient>

    <radialGradient id="gold-cage-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#DAA520" />
    </radialGradient>
    <linearGradient id="table-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B4513" />
      <stop offset="100%" stop-color="#5E2C0B" />
    </linearGradient>

    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <g id="small-bingo-ball">
      <circle cx="0" cy="0" r="15" fill="#FFFFFF" stroke="#E63946" stroke-width="2"/>
      <circle cx="0" cy="0" r="8" fill="#E63946" opacity="0.6"/>
    </g>

    <g id="dauber-tool">
      <rect x="-10" y="-30" width="20" height="50" rx="5" fill="#3A86FF" />
      <circle cx="0" cy="20" r="10" fill="#F72585" />
    </g>
    
    <g id="simple-bingo-card">
      <rect width="100" height="140" rx="8" fill="#FFFFFF" stroke="#E63946" stroke-width="3" filter="url(#drop-shadow)"/>
      <rect x="5" y="5" width="90" height="25" rx="4" fill="#E63946"/>
      <g transform="translate(5, 35)" fill="none" stroke="#E63946" stroke-width="2">
        <line x1="18" y1="0" x2="18" y2="100" /><line x1="36" y1="0" x2="36" y2="100" />
        <line x1="54" y1="0" x2="54" y2="100" /><line x1="72" y1="0" x2="72" y2="100" />
        <line x1="0" y1="20" x2="90" y2="20" /><line x1="0" y1="40" x2="90" y2="40" />
        <line x1="0" y1="60" x2="90" y2="60" /><line x1="0" y1="80" x2="90" y2="80" />
        <polygon points="45,50 40,55 45,60 50,55" fill="#FFD700" stroke="none"/> </g>
    </g>
  </defs>

  <rect width="1200" height="800" fill="url(#red-bg-grad)"/>
  <rect width="1200" height="800" fill="url(#grid-pattern)"/>

  <path d="M50,650 L1150,650 L1200,800 L0,800 Z" fill="url(#table-grad)"/>
  <rect x="50" y="630" width="1100" height="20" fill="#5E2C0B"/> <g transform="translate(200, 500)">
    <g transform="translate(0, -150)">
        <circle cx="0" cy="0" r="100" fill="none" stroke="url(#gold-cage-grad)" stroke-width="8"/>
        <line x1="-100" y1="0" x2="100" y2="0" stroke="url(#gold-cage-grad)" stroke-width="4"/>
        <line x1="0" y1="-100" x2="0" y2="100" stroke="url(#gold-cage-grad)" stroke-width="4"/>
        <path d="M-70.7,-70.7 L70.7,70.7" stroke="url(#gold-cage-grad)" stroke-width="4"/>
        <path d="M70.7,-70.7 L-70.7,70.7" stroke="url(#gold-cage-grad)" stroke-width="4"/>
        <use href="#small-bingo-ball" x="-30" y="40" />
        <use href="#small-bingo-ball" x="20" y="-50" />
        <use href="#small-bingo-ball" x="50" y="10" />
        <use href="#small-bingo-ball" x="-10" y="-20" />
        <path d="M-80,80 L-100,150 L100,150 L80,80" fill="#5E2C0B" stroke="#DAA520" stroke-width="4"/>
    </g>
    
    <g transform="translate(-150, -50)">
        <path d="M0,200 Q-30,100 0,50 Q30,100 0,200 Z" fill="#F1FAEE"/> <circle cx="0" cy="0" r="50" fill="#FFD6A5"/> <path d="M-50,0 Q-60,-40 0,-50 Q60,-40 50,0" fill="#6D4C41"/> <circle cx="-15" cy="5" r="5" fill="#000"/> <circle cx="15" cy="5" r="5" fill="#000"/> <path d="M-15,25 Q0,40 15,25" fill="none" stroke="#C70039" stroke-width="3"/> <path d="M50,50 C80,50 100,0 120,-20" fill="none" stroke="#FFD6A5" stroke-width="15" stroke-linecap="round"/>
        <g transform="translate(130, -30) scale(1.5)">
            <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#E63946" stroke-width="3" filter="url(#soft-glow)"/>
            <path d="M-8,-8 L-8,8 L8,8 L8,-8 Z" fill="#E63946"/> </g>
    </g>
  </g>

  <g transform="translate(600, 550)">
    <g transform="translate(-120, 0)">
      <circle cx="0" cy="-50" r="40" fill="#E2C09F"/> <path d="M-40,-60 Q0,-90 40,-60" fill="#3E2723"/> <rect x="-40" y="0" width="80" height="100" rx="20" fill="#457B9D"/> <path d="M40,20 C60,40 70,80 50,100" fill="none" stroke="#E2C09F" stroke-width="15" stroke-linecap="round"/>
      <g transform="translate(50, 110) rotate(-20)">
        <use href="#dauber-tool" />
      </g>
      <g transform="translate(10, 80) rotate(5) scale(0.8)">
        <use href="#simple-bingo-card" />
        <circle cx="27" cy="65" r="8" fill="#F72585" opacity="0.8"/> </g>
    </g>

    <g transform="translate(0, 50)">
      <circle cx="0" cy="-40" r="30" fill="#FFD6A5"/> <path d="M-30,-40 Q0,-70 30,-40" fill="#F4A261"/> <rect x="-30" y="0" width="60" height="70" rx="15" fill="#A8DADC"/> <path d="M30,10 C50,10 60,-10 70,-30" fill="none" stroke="#FFD6A5" stroke-width="10" stroke-linecap="round"/> </g>

    <g transform="translate(120, 0)">
      <circle cx="0" cy="-50" r="40" fill="#E2C09F"/> <path d="M-40,-50 C-50,-90 50,-90 40,-50" fill="#6D4C41"/> <rect x="-40" y="0" width="80" height="100" rx="20" fill="#F1FAEE"/> <path d="M-15,-45 Q0,-60 15,-45" fill="none" stroke="#000" stroke-width="3"/> <circle cx="-15" cy="-35" r="5" fill="#000"/> <circle cx="15" cy="-35" r="5" fill="#000"/> <path d="M-20,-20 Q0,0 20,-20 Z" fill="#D90429"/> <path d="M-30,30 C-50,10 -60,-30 -40,-60" fill="none" stroke="#E2C09F" stroke-width="15" stroke-linecap="round"/> <path d="M30,30 C50,10 60,-30 40,-60" fill="none" stroke="#E2C09F" stroke-width="15" stroke-linecap="round"/> <g transform="translate(0, -100) rotate(-5) scale(1.1)">
        <use href="#simple-bingo-card" />
        <circle cx="9" cy="45" r="8" fill="#F72585" opacity="0.9" filter="url(#soft-glow)"/>
        <circle cx="27" cy="65" r="8" fill="#F72585" opacity="0.9" filter="url(#soft-glow)"/>
        <circle cx="63" cy="105" r="8" fill="#F72585" opacity="0.9" filter="url(#soft-glow)"/>
        <circle cx="81" cy="125" r="8" fill="#F72585" opacity="0.9" filter="url(#soft-glow)"/>
        <path d="M-20,-20 L120,-20 L120,160 L-20,160 Z" fill="none" stroke="#FFD700" stroke-width="4" stroke-dasharray="10,5" opacity="0.7">
            <animate attributeName="stroke-dashoffset" from="0" to="30" dur="1s" repeatCount="indefinite" />
        </path>
      </g>
    </g>
  </g>
  
  <g transform="translate(1000, 580)">
      <g transform="translate(-60, 0)">
          <circle cx="0" cy="-40" r="35" fill="#FFD6A5"/>
          <path d="M-35,-40 C-35,-80 35,-80 35,-40" fill="#212529"/> <path d="M-15,-25 Q0,-10 15,-25" fill="none" stroke="#000" stroke-width="3"/> <path d="M-20,-15 Q0,5 20,-15 Z" fill="#D90429"/> <rect x="-35" y="0" width="70" height="80" rx="15" fill="#1D3557"/>
      </g>
      <g transform="translate(60, 0)">
          <circle cx="0" cy="-40" r="35" fill="#E2C09F"/>
          <path d="M-35,-50 L0,-80 L35,-50 Z" fill="#F4A261"/> <rect x="-35" y="0" width="70" height="80" rx="15" fill="#457B9D"/>
          <g transform="translate(0, 80) scale(0.8)">
              <use href="#simple-bingo-card" />
          </g>
      </g>
  </g>

  <g transform="translate(450, 650)">
    <path d="M-30,0 L30,0 L20,40 L-20,40 Z" fill="#F1FAEE" stroke="#E63946" stroke-width="2"/>
    <circle cx="-10" cy="-5" r="10" fill="#FFD700"/> <circle cx="10" cy="-5" r="10" fill="#FFD700"/>
    <circle cx="0" cy="-15" r="10" fill="#FFD700"/>
  </g>
  <g transform="translate(850, 660) rotate(30)">
      <use href="#dauber-tool" />
  </g>

  <g filter="url(#soft-glow)">
    <use href="#small-bingo-ball" x="100" y="700" transform="scale(1.5)" />
    <use href="#small-bingo-ball" x="1100" y="400" transform="scale(1.2)" />
    <rect x="300" y="200" width="10" height="10" fill="#FFD700" transform="rotate(45)" />
    <rect x="800" y="100" width="10" height="10" fill="#F72585" transform="rotate(30)" />
    <circle cx="500" cy="300" r="5" fill="#3A86FF" />
    <circle cx="900" cy="250" r="5" fill="#06D6A0" />
    <path d="M700,400 L710,420 L690,420 Z" fill="#FFD700" transform="rotate(15)" />
  </g>

</svg>